<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FAENA CLOUD - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; }
        .top-bar { background: #003B68; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .role-badge { background: #27ae60; padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .dashboard-container { display: flex; min-height: calc(100vh - 70px); }
        .sidebar { width: 280px; background: white; border-right: 1px solid #e0e0e0; }
        .modulo-btn { width: 100%; padding: 15px 20px; text-align: left; background: none; border: none; cursor: pointer; font-size: 14px; border-left: 3px solid transparent; }
        .modulo-btn:hover { background: #f0f0f0; border-left-color: #003B68; }
        .content-area { flex: 1; padding: 20px; }
        .welcome-card { background: white; border-radius: 15px; padding: 30px; text-align: center; }
        .menu-toggle { display: none; background: #003B68; color: white; padding: 10px; text-align: center; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; z-index: 1000; transition: left 0.3s; }
            .sidebar.open { left: 0; }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo"><strong>FAENA CLOUD</strong></div>
        <div class="user-info">
            <span id="userName">Usuario</span>
            <span id="userRole" class="role-badge"></span>
            <button class="btn-logout" id="logoutBtn">Salir</button>
        </div>
    </div>
    <div class="menu-toggle" id="menuToggle">☰ Menú</div>
    <div class="dashboard-container">
        <div class="sidebar" id="sidebar">
            <button class="modulo-btn" data-modulo="empresa">🏢 Gestión de Empresa</button>
            <button class="modulo-btn" data-modulo="clientes">📋 Catálogo de Clientes</button>
            <button class="modulo-btn" data-modulo="catalogo">🗂️ Base de Datos</button>
            <button class="modulo-btn" data-modulo="apus">📊 APUs</button>
            <button class="modulo-btn" data-modulo="cotizaciones">💰 Cotizaciones</button>
            <button class="modulo-btn" data-modulo="contrataciones">📄 Contrataciones</button>
            <button class="modulo-btn" data-modulo="manual">⚠️ Manual Seguro</button>
            <button class="modulo-btn" data-modulo="obras">🔍 Seguimiento Obras</button>
            <button class="modulo-btn" data-modulo="liquidacion">📉 Liquidación</button>
            <button class="modulo-btn" data-modulo="comunicacion">💬 Comunicación</button>
        </div>
        <div class="content-area" id="contentArea">
            <div class="welcome-card">
                <h2>Bienvenido a FAENA CLOUD</h2>
                <p>Selecciona un módulo del menú lateral para comenzar.</p>
                <p style="margin-top: 20px; color: #27ae60;">✅ Sistema funcionando</p>
            </div>
        </div>
    </div>
    <script>
        const sesion = sessionStorage.getItem('faena_sesion');
        if (!sesion) window.location.href = 'index.html';
        const usuario = JSON.parse(sesion);
        document.getElementById('userName').textContent = usuario.nombre || usuario.email;
        document.getElementById('userRole').textContent = usuario.rol == 3 ? 'Administrador' : (usuario.rol == 2 ? 'Supervisor' : 'Operador');
        document.getElementById('logoutBtn').onclick = () => { sessionStorage.clear(); window.location.href = 'index.html'; };
        document.getElementById('menuToggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');
        
        document.querySelectorAll('.modulo-btn').forEach(btn => {
            btn.onclick = () => {
                const modulo = btn.dataset.modulo;
                const area = document.getElementById('contentArea');
                if (modulo === 'catalogo') {
                    fetch('modulos/catalogo-cloud.html')
                        .then(r => r.text())
                        .then(html => {
                            area.innerHTML = html;
                            const match = html.match(/<script>([\s\S]*?)<\/script>/);
                            if (match) eval(match[1]);
                        })
                        .catch(() => area.innerHTML = '<div class="welcome-card"><h2>Error</h2><p>No se pudo cargar el módulo</p></div>');
                } else {
                    area.innerHTML = `<div class="welcome-card"><h2>📦 Módulo: ${modulo}</h2><p>En construcción</p><button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#003B68;color:white;border:none;border-radius:8px;">Volver</button></div>`;
                }
                if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
            };
        });
    </script>
</body>
</html>
