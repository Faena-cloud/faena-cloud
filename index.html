<!DOCTYPE html>
<html lang="es">
<head>
    <title>FAENA CLOUD - Sistema de Gestión</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #003B68 0%, #002244 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #003B68;
            margin-bottom: 10px;
        }
        .faena {
            color: #667eea;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .status {
            background: #27ae60;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
  <img src="Faena_ingenieria.png" alt="FAENA CLOUD" style="height: 60px;">
  
</h1>
        <div class="faena">FAENA INGENIERÍA SPA</div>
        <p>Sistema de Gestión de Obras, APUs y Contrataciones</p>
        <div class="status">
            ✅ Sistema funcionando correctamente
        </div>
        <p style="font-size: 12px; margin-top: 20px;">
            Próximamente: Login con 3 niveles de acceso
        </p>
    </div>
</body>
</html>
